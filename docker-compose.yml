services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellartip-api
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    command: npm run start:dev

  db:
    image: postgres:16-alpine
    container_name: stellartip-db
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-stellartip}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-stellartip}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
